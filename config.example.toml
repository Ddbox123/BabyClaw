# ============================================================
# Self-Evolving Agent 主配置
# ============================================================
# 本文件是项目的完整主配置面。想知道项目当前如何运行，先看这里。
# 模型默认值仅作为最低优先级兜底。
# 配置优先级：命令行参数(kwargs) > 环境变量 > config.toml > 默认值
# ============================================================

[runtime]
profile = "safe_remote"
preflight_doctor = true
require_venv = true

[avatar]
preset = "lobster"

[llm]

[llm.profiles]

